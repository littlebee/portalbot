# Coturn TURN server configuration for Portalbot public deployment.
#
# This file is intended to be copied to /etc/turnserver.conf on the TURN host.
# Update the values marked "REQUIRED" before deploying.

# Listen for TURN over UDP/TCP.
listening-port=3478

# Listen for TURN over TLS (turns:).
tls-listening-port=5349

# Local interface addresses on the TURN host (EC2 private IP).
listening-ip=172.31.43.14
relay-ip=172.31.43.14

# REQUIRED: map public IP to private IP when running behind EC2 NAT.
# Format: external-ip=<PUBLIC_IP>/<PRIVATE_IP>
external-ip=3.134.87.34/172.31.43.14

# Use long-term credentials.
fingerprint
realm=portalbot.net
server-name=portalbot.net
lt-cred-mech
user=user:pass

# Relay port range (open this range in Security Group and NACL).
min-port=49160
max-port=49200

# TLS cert/key for turns: listener.
# REQUIRED: set valid PEM paths on the TURN host.
cert=/etc/letsencrypt/live/portalbot.net/fullchain.pem
pkey=/etc/letsencrypt/live/portalbot.net/privkey.pem

# Logging.
log-file=/var/log/turn.log
syslog

# Hardening settings.
no-rfc5780
no-stun-backward-compatibility
response-origin-only-with-rfc5780
